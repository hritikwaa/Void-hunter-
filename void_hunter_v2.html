<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID HUNTER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    touch-action: none;
  }
  #wrapper {
    position: relative;
    width: 480px;
    height: 680px;
  }
  canvas {
    display: block;
    border: 1px solid #1a1a2e;
    box-shadow: 0 0 40px #0f3460aa, 0 0 80px #0a0a1aaa;
  }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px;
    pointer-events: none;
    z-index: 10;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; color: #e94560;
    letter-spacing: 3px; opacity: 0.7;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700;
    color: #eaeaea; text-shadow: 0 0 10px #e9456088;
  }
  #lives-display { display: flex; gap: 5px; margin-top: 4px; }
  .life-pip {
    width: 8px; height: 18px;
    background: #e94560; box-shadow: 0 0 6px #e94560;
    border-radius: 2px; transition: opacity 0.3s;
  }
  .life-pip.dead { opacity: 0.15; background: #333; box-shadow: none; }

  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: radial-gradient(ellipse at center, #0a0a1a88 0%, #000000cc 100%);
    z-index: 20; gap: 16px;
  }
  #overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px; font-weight: 900;
    color: #fff; letter-spacing: 6px; text-align: center;
    text-shadow: 0 0 20px #e94560, 0 0 60px #e9456066;
    animation: pulse 2s ease-in-out infinite;
    line-height: 1.1;
  }
  #overlay .subtitle {
    font-size: 13px; color: #e94560;
    letter-spacing: 3px; opacity: 0.8;
    font-family: 'Share Tech Mono', monospace;
  }
  #overlay .instructions {
    font-size: 11px; color: #555; letter-spacing: 1px;
    line-height: 2; text-align: center;
  }
  #start-btn {
    margin-top: 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 4px; color: #000;
    background: #e94560; border: none;
    padding: 14px 40px; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.2s; box-shadow: 0 0 20px #e9456066;
  }
  #start-btn:hover { background: #fff; box-shadow: 0 0 30px #ffffffaa; transform: scale(1.05); }
  .final-score { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #888; letter-spacing: 2px; }
  .final-score span { color: #e94560; font-size: 20px; }
  #high-scores {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    margin-top: 4px;
  }
  #high-scores .hs-title {
    font-family: 'Orbitron', sans-serif; font-size: 9px;
    color: #e94560; letter-spacing: 3px; opacity: 0.7; margin-bottom: 4px;
  }
  .hs-row {
    font-size: 12px; color: #555; letter-spacing: 1px;
    display: flex; gap: 16px; width: 180px;
    justify-content: space-between;
  }
  .hs-row.gold { color: #ffd700; }
  .hs-row.silver { color: #aaa; }
  .hs-row.bronze { color: #cd7f32; }

  /* Touch controls */
  #touch-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 10px 14px 14px;
    pointer-events: none;
    z-index: 15;
  }
  .touch-pad {
    display: grid; grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px; gap: 4px;
    pointer-events: all;
  }
  .t-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; display: flex;
    justify-content: center; align-items: center;
    font-size: 18px; cursor: pointer;
    user-select: none; -webkit-user-select: none;
    color: rgba(255,255,255,0.5);
    transition: background 0.1s;
    touch-action: none;
  }
  .t-btn:active, .t-btn.pressed { background: rgba(233,69,96,0.25); border-color: #e94560; }
  #t-up { grid-column: 2; grid-row: 1; }
  #t-left { grid-column: 1; grid-row: 2; }
  #t-down { grid-column: 2; grid-row: 2; }
  #t-right { grid-column: 3; grid-row: 2; }
  #t-fire {
    width: 80px; height: 80px;
    border-radius: 50%; pointer-events: all;
    background: rgba(233,69,96,0.15);
    border: 2px solid rgba(233,69,96,0.4);
    font-size: 22px; display: flex;
    justify-content: center; align-items: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: none; color: #e94560;
    transition: background 0.1s;
    align-self: flex-end; margin-bottom: 4px;
  }
  #t-fire:active, #t-fire.pressed { background: rgba(233,69,96,0.4); }

  #boss-bar-wrap {
    position: absolute; top: 55px; left: 0; right: 0;
    display: none; flex-direction: column;
    align-items: center; gap: 4px;
    padding: 0 18px;
    z-index: 10; pointer-events: none;
  }
  #boss-label {
    font-family: 'Orbitron', sans-serif; font-size: 9px;
    color: #f0a; letter-spacing: 3px;
  }
  #boss-bar-bg {
    width: 100%; height: 6px;
    background: #1a0010; border-radius: 3px;
    border: 1px solid #f0a44;
  }
  #boss-bar-fill {
    height: 100%; background: linear-gradient(90deg, #7700aa, #f0a);
    border-radius: 3px; transition: width 0.1s;
    box-shadow: 0 0 8px #f0a;
  }

  #powerup-indicator {
    position: absolute; bottom: 100px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif; font-size: 11px;
    letter-spacing: 2px; padding: 4px 14px;
    border-radius: 2px; pointer-events: none;
    z-index: 10; opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px #e94560, 0 0 60px #e9456066; }
    50% { text-shadow: 0 0 30px #e94560, 0 0 80px #e94560aa; }
  }
  @keyframes fadeUp {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
  }

  @media (max-width: 500px) {
    #wrapper { width: 100vw; height: 100svh; }
    canvas { width: 100vw; height: 100svh; }
    #touch-controls { display: flex; }
  }
  @media (pointer: coarse) {
    #touch-controls { display: flex; }
    #overlay .instructions .kb { display: none; }
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="480" height="680"></canvas>

  <div id="ui">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
    <div class="stat" style="align-items:center">
      <div class="stat-label">Wave</div>
      <div class="stat-value" id="wave-val">1</div>
    </div>
    <div class="stat" style="align-items:flex-end">
      <div class="stat-label">Lives</div>
      <div id="lives-display"></div>
    </div>
  </div>

  <div id="boss-bar-wrap">
    <div id="boss-label">⬡ VOID HERALD ⬡</div>
    <div id="boss-bar-bg"><div id="boss-bar-fill" style="width:100%"></div></div>
  </div>

  <div id="powerup-indicator"></div>

  <div id="touch-controls">
    <div class="touch-pad">
      <div class="t-btn" id="t-up">▲</div>
      <div class="t-btn" id="t-left">◀</div>
      <div class="t-btn" id="t-down">▼</div>
      <div class="t-btn" id="t-right">▶</div>
    </div>
    <div id="t-fire">🔥</div>
  </div>

  <div id="overlay">
    <h1>VOID<br>HUNTER</h1>
    <div class="subtitle">— ARCADE EDITION —</div>
    <div class="instructions">
      <span class="kb">← → MOVE &nbsp; SPACE FIRE<br></span>
      Survive waves · Collect power-ups<br>
      Defeat the VOID HERALD boss
    </div>
    <div class="final-score" id="final-score" style="display:none">
      FINAL SCORE &nbsp; <span id="final-score-val">0</span>
    </div>
    <div id="high-scores">
      <div class="hs-title">HIGH SCORES</div>
    </div>
    <button id="start-btn">LAUNCH</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const scoreEl = document.getElementById('score-val');
const waveEl = document.getElementById('wave-val');
const livesEl = document.getElementById('lives-display');
const finalScore = document.getElementById('final-score');
const finalScoreVal = document.getElementById('final-score-val');
const overlayTitle = overlay.querySelector('h1');
const bossBarWrap = document.getElementById('boss-bar-wrap');
const bossBarFill = document.getElementById('boss-bar-fill');
const puIndicator = document.getElementById('powerup-indicator');
const hsContainer = document.getElementById('high-scores');

// ── High Scores ──────────────────────────────────────────────
const HS_KEY = 'voidhunter_hs';
function getScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch { return []; }
}
function saveScore(s) {
  let scores = getScores();
  scores.push(s);
  scores.sort((a,b) => b-a);
  scores = scores.slice(0, 5);
  try { localStorage.setItem(HS_KEY, JSON.stringify(scores)); } catch {}
}
function renderHS() {
  const scores = getScores();
  hsContainer.innerHTML = '<div class="hs-title">HIGH SCORES</div>';
  if (scores.length === 0) {
    const r = document.createElement('div');
    r.className = 'hs-row'; r.textContent = 'No scores yet';
    hsContainer.appendChild(r);
    return;
  }
  const medals = ['gold','silver','bronze'];
  scores.forEach((s, i) => {
    const r = document.createElement('div');
    r.className = 'hs-row ' + (medals[i] || '');
    r.innerHTML = `<span>#${i+1}</span><span>${s.toLocaleString()}</span>`;
    hsContainer.appendChild(r);
  });
}
renderHS();

// ── State ─────────────────────────────────────────────────────
let state = 'menu';
let score, wave, lives, player, bullets, enemies, particles, stars, explosions;
let bgNebulas, enemyBullets, shootTimer, powerups, boss, bossPhase;
let keys = {}, touchKeys = {};
let animId, lastTime = 0, gameOver = false;

// ── Stars ─────────────────────────────────────────────────────
function initStars() {
  stars = Array.from({length:130}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.5+0.3, speed: Math.random()*0.5+0.1,
    alpha: Math.random()*0.7+0.3,
  }));
  bgNebulas = Array.from({length:4}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    rx: Math.random()*120+60, ry: Math.random()*80+40,
    hue: Math.random()>0.5?340:200,
  }));
}

// ── Init ──────────────────────────────────────────────────────
function initGame() {
  score=0; wave=1; lives=3; gameOver=false;
  bullets=[]; enemies=[]; particles=[]; explosions=[];
  enemyBullets=[]; powerups=[]; boss=null; bossPhase=0;
  shootTimer=0;
  player = {
    x:W/2, y:H-70, w:32, h:36, speed:5,
    iframes:0, thrustFlicker:0,
    shield:0, rapidfire:0, trishot:0,
  };
  bossBarWrap.style.display='none';
  spawnWave();
  updateUI();
}

// ── Waves ─────────────────────────────────────────────────────
const BOSS_WAVE = 5;
function spawnWave() {
  if (wave % BOSS_WAVE === 0) { spawnBoss(); return; }
  const cols = Math.min(4+wave, 9);
  const rows = Math.min(1+Math.floor(wave/2), 4);
  const gapX = (W-60)/cols;
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      enemies.push({
        x: 30+c*gapX+gapX/2, y: 60+r*52,
        w:28, h:22,
        hp: 1+Math.floor(wave/4), maxHp: 1+Math.floor(wave/4),
        dx: (0.6+wave*0.1)*(Math.random()>0.5?1:-1),
        shootCd: Math.random()*180+60,
        type: r===0?'elite':'basic', flash:0,
      });
    }
  }
}

// ── Boss ──────────────────────────────────────────────────────
function spawnBoss() {
  const maxHp = 80 + wave * 20;
  boss = {
    x: W/2, y: 90, w: 70, h: 50,
    hp: maxHp, maxHp,
    dx: 1.5, dy: 0,
    phase: 0, phaseTick: 0,
    shootCd: 40, flash: 0,
    angle: 0,
  };
  bossBarWrap.style.display='flex';
  bossBarFill.style.width='100%';
  showPowerupMsg('⬡ VOID HERALD APPROACHES ⬡', '#f0a');
}

function updateBoss() {
  if (!boss) return;
  boss.angle += 0.02;
  boss.flash = Math.max(0, boss.flash-1);
  boss.x += boss.dx;
  if (boss.x > W-50 || boss.x < 50) boss.dx *= -1;

  boss.phaseTick++;
  const tick = boss.phaseTick;
  const hpRatio = boss.hp/boss.maxHp;

  // Phase 2 at 50% HP
  if (hpRatio < 0.5 && boss.phase === 0) {
    boss.phase = 1;
    showPowerupMsg('VOID HERALD ENRAGED!', '#f55');
  }

  // Shooting patterns
  const shootRate = boss.phase === 0 ? 50 : 28;
  boss.shootCd--;
  if (boss.shootCd <= 0) {
    boss.shootCd = shootRate;
    if (boss.phase === 0) {
      // Spread shot
      [-1,0,1].forEach(offset => {
        enemyBullets.push({ x:boss.x+offset*20, y:boss.y+40, vx:offset*1.2, vy:4, isBoss:true });
      });
    } else {
      // Ring shot
      const count = 8;
      for (let i=0;i<count;i++) {
        const a = (Math.PI*2/count)*i + boss.angle;
        enemyBullets.push({ x:boss.x, y:boss.y+20, vx:Math.cos(a)*3, vy:Math.sin(a)*3, isBoss:true });
      }
    }
  }

  // Dive occasionally in phase 2
  if (boss.phase===1 && tick%200===0) {
    boss.dy = 3;
  }
  boss.y += boss.dy;
  if (boss.y > 160) boss.dy = Math.max(0, boss.dy-0.15);
  if (boss.y < 90) { boss.y=90; boss.dy=0; }

  bossBarFill.style.width = (boss.hp/boss.maxHp*100)+'%';

  // Boss death
  if (boss.hp <= 0) {
    score += 500 + wave*50;
    spawnExplosion(boss.x, boss.y, true);
    spawnExplosion(boss.x-30, boss.y+20, true);
    spawnExplosion(boss.x+30, boss.y-10, true);
    boss = null;
    bossBarWrap.style.display='none';
    updateUI();
    showPowerupMsg('VOID HERALD DEFEATED! +500', '#ffd700');
    setTimeout(()=>{ wave++; waveEl.textContent=wave; spawnWave(); }, 1200);
  }
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);

  const glowColor = boss.flash>0 ? '#fff' : (boss.phase===1?'#f55':'#f0a');
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 30;

  // Outer ring
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 38+Math.sin(boss.angle*3)*4, 0, Math.PI*2);
  ctx.stroke();

  // Rotating arms
  for (let i=0;i<6;i++) {
    const a = boss.angle + (Math.PI*2/6)*i;
    ctx.save();
    ctx.rotate(a);
    ctx.fillStyle = boss.flash>0?'#fff': (boss.phase===1?'#f55':'#c060d0');
    ctx.fillRect(20, -3, 14, 6);
    ctx.restore();
  }

  // Main body hex
  ctx.fillStyle = boss.flash>0?'#fff':(boss.phase===1?'#3a0010':'#1a0030');
  ctx.beginPath();
  for (let i=0;i<6;i++) {
    const a = (Math.PI/3)*i - Math.PI/6;
    const r = 28;
    i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = boss.phase===1?'#f55':'#f0a';
  ctx.lineWidth=2; ctx.stroke();

  // Core
  const coreG = ctx.createRadialGradient(0,0,0,0,0,14);
  coreG.addColorStop(0,'#fff');
  coreG.addColorStop(0.4, boss.phase===1?'#f55':'#f0a');
  coreG.addColorStop(1,'transparent');
  ctx.fillStyle=coreG;
  ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();

  // HP bar
  ctx.fillStyle='#300'; ctx.fillRect(-34,-46,68,6);
  const ratio = boss.hp/boss.maxHp;
  const barColor = ratio>0.5?'#f0a': ratio>0.25?'#f55':'#f00';
  ctx.fillStyle=barColor;
  ctx.fillRect(-34,-46,68*ratio,6);
  ctx.strokeStyle='#f0a4'; ctx.lineWidth=1;
  ctx.strokeRect(-34,-46,68,6);

  ctx.restore();
}

// ── Power-ups ─────────────────────────────────────────────────
const PU_TYPES = [
  { type:'shield',  color:'#3af', label:'SHIELD',    icon:'🛡' },
  { type:'rapid',   color:'#ff0', label:'RAPIDFIRE',  icon:'⚡' },
  { type:'trishot', color:'#0f8', label:'TRI-SHOT',   icon:'✦' },
  { type:'life',    color:'#f55', label:'+1 LIFE',    icon:'♥' },
];

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return; // 25% chance
  const t = PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  powerups.push({ x, y, vy:1.5, ...t, life:400, pulse:0 });
}

function updatePowerups() {
  powerups.forEach(p => {
    p.y += p.vy; p.pulse++;  p.life--;
    const dx = Math.abs(p.x - player.x);
    const dy = Math.abs(p.y - player.y);
    if (dx<20 && dy<20) {
      p.collected=true;
      applyPowerup(p);
    }
  });
  powerups = powerups.filter(p => p.y<H+20 && p.life>0 && !p.collected);
}

function applyPowerup(p) {
  if (p.type==='shield')  { player.shield=300; }
  if (p.type==='rapid')   { player.rapidfire=300; }
  if (p.type==='trishot') { player.trishot=300; }
  if (p.type==='life')    { lives=Math.min(3,lives+1); updateUI(); }
  showPowerupMsg(p.icon+' '+p.label+' ACTIVATED', p.color);
}

function drawPowerups() {
  powerups.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    const glow = 0.6+0.4*Math.sin(p.pulse*0.1);
    ctx.shadowColor=p.color; ctx.shadowBlur=16*glow;
    ctx.globalAlpha = p.life<60 ? p.life/60 : 1;

    // Rotating square
    ctx.save();
    ctx.rotate(p.pulse*0.04);
    ctx.strokeStyle=p.color; ctx.lineWidth=1.5;
    ctx.strokeRect(-10,-10,20,20);
    ctx.restore();

    // Inner diamond
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.moveTo(0,-7); ctx.lineTo(7,0); ctx.lineTo(0,7); ctx.lineTo(-7,0);
    ctx.closePath(); ctx.fill();

    ctx.restore();
  });
}

function showPowerupMsg(msg, color='#fff') {
  puIndicator.textContent = msg;
  puIndicator.style.color = color;
  puIndicator.style.borderColor = color+'44';
  puIndicator.style.animation = 'none';
  puIndicator.offsetHeight; // reflow
  puIndicator.style.animation = 'fadeUp 1.8s ease forwards';
}

// ── UI ────────────────────────────────────────────────────────
function updateUI() {
  scoreEl.textContent = score;
  waveEl.textContent = wave;
  livesEl.innerHTML='';
  for (let i=0;i<3;i++) {
    const pip=document.createElement('div');
    pip.className='life-pip'+(i>=lives?' dead':'');
    livesEl.appendChild(pip);
  }
}

// ── Particles / Explosions ────────────────────────────────────
function spawnParticles(x,y,color,count=12) {
  for (let i=0;i<count;i++) {
    const angle=Math.random()*Math.PI*2, speed=Math.random()*3+1;
    particles.push({ x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:1, decay:Math.random()*0.03+0.02, r:Math.random()*3+1, color });
  }
}
function spawnExplosion(x,y,big=false) {
  explosions.push({ x,y, r:0, life:1, big });
  spawnParticles(x,y,big?'#ff6b35':'#e94560',big?24:10);
}

// ── Drawing ───────────────────────────────────────────────────
function drawStars() {
  bgNebulas.forEach(n => {
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.rx);
    g.addColorStop(0,`hsla(${n.hue},60%,25%,0.08)`);
    g.addColorStop(1,'transparent');
    ctx.save(); ctx.scale(1,n.ry/n.rx);
    ctx.fillStyle=g; ctx.beginPath();
    ctx.arc(n.x,n.y*n.rx/n.ry,n.rx,0,Math.PI*2);
    ctx.fill(); ctx.restore();
  });
  stars.forEach(s=>{
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,255,${s.alpha})`; ctx.fill();
    s.y+=s.speed; if(s.y>H){s.y=0;s.x=Math.random()*W;}
  });
}

function drawPlayer() {
  const p=player;
  if (p.iframes>0 && Math.floor(p.iframes/4)%2===0) return;
  ctx.save(); ctx.translate(p.x,p.y);

  // Shield bubble
  if (p.shield>0) {
    ctx.save();
    const sa=p.shield<60?p.shield/60:1;
    ctx.globalAlpha=sa*0.4;
    ctx.strokeStyle='#3af'; ctx.lineWidth=2;
    ctx.shadowColor='#3af'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=sa*0.1; ctx.fillStyle='#3af';
    ctx.fill(); ctx.restore();
  }

  // Thruster
  p.thrustFlicker=(p.thrustFlicker+0.3)%(Math.PI*2);
  const tH=14+Math.sin(p.thrustFlicker)*5;
  const tg=ctx.createLinearGradient(0,8,0,8+tH);
  tg.addColorStop(0,'#e94560'); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.moveTo(-8,10); ctx.lineTo(0,10+tH); ctx.lineTo(8,10);
  ctx.closePath(); ctx.fill();

  // Body
  ctx.shadowColor=p.trishot>0?'#0f8':p.rapidfire>0?'#ff0':'#5bf';
  ctx.shadowBlur=16;
  ctx.fillStyle='#0a1628';
  ctx.beginPath();
  ctx.moveTo(0,-18); ctx.lineTo(14,14); ctx.lineTo(0,8); ctx.lineTo(-14,14);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=p.trishot>0?'#0f8':p.rapidfire>0?'#ff0':'#3af';
  ctx.lineWidth=1.5; ctx.stroke();

  // Cockpit
  ctx.fillStyle=ctx.strokeStyle; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.ellipse(0,-4,4,7,0,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.shadowColor=e.flash>0?'#fff':(e.type==='elite'?'#f0a':'#e94560');
  ctx.shadowBlur=e.flash>0?20:10;
  const c=e.flash>0?'#fff':(e.type==='elite'?'#c060d0':'#e94560');
  ctx.fillStyle=c;
  if (e.type==='elite') {
    ctx.beginPath();
    ctx.moveTo(0,-12); ctx.lineTo(14,0); ctx.lineTo(0,10); ctx.lineTo(-14,0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#f8f'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#f8f'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-12,-8); ctx.lineTo(-12,6); ctx.lineTo(-6,10);
    ctx.lineTo(6,10); ctx.lineTo(12,6); ctx.lineTo(12,-8);
    ctx.lineTo(6,-11); ctx.lineTo(-6,-11); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ff8'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-5,-2,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-2,2.5,0,Math.PI*2); ctx.fill();
  }
  if (e.hp<e.maxHp) {
    ctx.fillStyle='#300'; ctx.fillRect(-12,-18,24,3);
    ctx.fillStyle='#e94560'; ctx.fillRect(-12,-18,24*(e.hp/e.maxHp),3);
  }
  ctx.restore();
}

function drawBullet(b, isEnemy=false) {
  ctx.save();
  const col = b.isBoss?'#f0a': isEnemy?'#ffa040':'#7df';
  ctx.shadowColor=col; ctx.shadowBlur=12; ctx.fillStyle=col;
  ctx.beginPath(); ctx.roundRect(b.x-2,b.y-6,4,12,2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.shadowColor=p.color; ctx.shadowBlur=8; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=p.decay;
  });
  particles=particles.filter(p=>p.life>0);
}

function drawExplosions() {
  explosions.forEach(e=>{
    ctx.save(); ctx.globalAlpha=e.life*0.5;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
    g.addColorStop(0,e.big?'#ff6b35':'#e94560');
    g.addColorStop(0.5,e.big?'#ff3300':'#880020');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    e.r+=e.big?4:2.5; e.life-=0.06;
  });
  explosions=explosions.filter(e=>e.life>0);
}

// ── Update ────────────────────────────────────────────────────
function isKey(k) { return keys[k] || touchKeys[k]; }

function update() {
  const p=player;
  if (isKey('left'))  p.x=Math.max(20,p.x-p.speed);
  if (isKey('right')) p.x=Math.min(W-20,p.x+p.speed);
  if (isKey('up'))    p.y=Math.max(80,p.y-p.speed*0.6);
  if (isKey('down'))  p.y=Math.min(H-30,p.y+p.speed*0.6);
  if (p.iframes>0) p.iframes--;
  if (p.shield>0)    p.shield--;
  if (p.rapidfire>0) p.rapidfire--;
  if (p.trishot>0)   p.trishot--;

  // Shoot
  const rate = p.rapidfire>0?5:12;
  shootTimer--;
  if (isKey('fire') && shootTimer<=0) {
    shootTimer=rate;
    if (p.trishot>0) {
      bullets.push({x:p.x,y:p.y-20,vx:0});
      bullets.push({x:p.x,y:p.y-20,vx:-2.5});
      bullets.push({x:p.x,y:p.y-20,vx:2.5});
    } else {
      bullets.push({x:p.x,y:p.y-20,vx:0});
    }
  }

  // Move bullets
  bullets.forEach(b=>{ b.y-=9; b.x+=b.vx||0; });
  bullets=bullets.filter(b=>b.y>-10&&b.x>-10&&b.x<W+10);

  // Enemy movement
  let hitWall=false;
  enemies.forEach(e=>{
    e.x+=e.dx; e.flash=Math.max(0,e.flash-1);
    if (e.x>W-20||e.x<20) hitWall=true;
    e.shootCd--;
    if (e.shootCd<=0) {
      enemyBullets.push({x:e.x,y:e.y+12,vx:0});
      e.shootCd=Math.max(30,150-wave*8)+Math.random()*60;
    }
  });
  if (hitWall) enemies.forEach(e=>{ e.dx*=-1; e.y+=16; });

  // Boss
  updateBoss();

  // Enemy bullets
  const spd=4+wave*0.3;
  enemyBullets.forEach(b=>{ b.y+=b.vy||spd; b.x+=b.vx||0; });
  enemyBullets=enemyBullets.filter(b=>b.y<H+10&&b.x>-20&&b.x<W+20);

  // Power-ups
  updatePowerups();

  // Bullet vs enemy
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if (Math.abs(b.x-e.x)<16&&Math.abs(b.y-e.y)<14) {
        b.hit=true; e.hp--; e.flash=8;
        if (e.hp<=0) {
          e.dead=true;
          score+=e.type==='elite'?50:10;
          spawnExplosion(e.x,e.y,e.type==='elite');
          spawnPowerup(e.x,e.y);
          updateUI();
        }
      }
    });
    // Bullet vs boss
    if (boss&&Math.abs(b.x-boss.x)<40&&Math.abs(b.y-boss.y)<34) {
      b.hit=true; boss.hp--; boss.flash=4;
      score+=2; updateUI();
    }
  });
  bullets=bullets.filter(b=>!b.hit);
  enemies=enemies.filter(e=>!e.dead);

  // Enemy/boss bullets vs player
  if (p.iframes<=0) {
    enemyBullets.forEach(b=>{
      if (Math.abs(b.x-p.x)<14&&Math.abs(b.y-p.y)<16) {
        b.hit=true;
        if (p.shield>0) { p.shield=0; spawnParticles(p.x,p.y,'#3af',16); return; }
        lives--; p.iframes=90; spawnExplosion(p.x,p.y,false); updateUI();
        if (lives<=0) triggerGameOver();
      }
    });
    enemyBullets=enemyBullets.filter(b=>!b.hit);
    // Enemy body collision
    enemies.forEach(e=>{
      if (Math.abs(e.x-p.x)<22&&Math.abs(e.y-p.y)<20) {
        if (p.shield>0) { p.shield=0; e.dead=true; spawnExplosion(e.x,e.y,false); return; }
        lives--; p.iframes=90; e.dead=true; spawnExplosion(e.x,e.y,true); updateUI();
        if (lives<=0) triggerGameOver();
      }
    });
    enemies=enemies.filter(e=>!e.dead);
    // Enemies reach bottom
    enemies.forEach(e=>{
      if (e.y>H-40){ lives--; e.dead=true; spawnExplosion(e.x,e.y,false); updateUI(); if(lives<=0) triggerGameOver(); }
    });
    enemies=enemies.filter(e=>!e.dead);
  }

  // Next wave
  if (!boss && enemies.length===0 && !gameOver) {
    wave++;
    waveEl.textContent=wave;
    enemyBullets=[];
    if (wave%3===0&&lives<3){lives++;updateUI();}
    spawnWave();
  }
}

// ── Game Over ─────────────────────────────────────────────────
function triggerGameOver() {
  gameOver=true; state='over';
  saveScore(score);
  setTimeout(()=>{
    overlayTitle.innerHTML='GAME<br>OVER';
    finalScoreVal.textContent=score.toLocaleString();
    finalScore.style.display='block';
    startBtn.textContent='RETRY';
    renderHS();
    overlay.style.display='flex';
  }, 900);
}

// ── Game Loop ─────────────────────────────────────────────────
function gameLoop(ts) {
  lastTime=ts;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050509'; ctx.fillRect(0,0,W,H);
  drawStars();

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.025)';
  for (let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);

  if (!gameOver) update();

  drawExplosions();
  if (boss) drawBoss();
  enemies.forEach(drawEnemy);
  drawPowerups();
  bullets.forEach(b=>drawBullet(b,false));
  enemyBullets.forEach(b=>drawBullet(b,true));
  drawPlayer();
  drawParticles();

  // Top vignette
  const tg=ctx.createLinearGradient(0,0,0,58);
  tg.addColorStop(0,'rgba(0,0,5,0.92)'); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg; ctx.fillRect(0,0,W,58);

  if (!gameOver) animId=requestAnimationFrame(gameLoop);
}

// ── Controls ──────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if (e.key==='ArrowLeft'||e.key==='a') keys['left']=true;
  if (e.key==='ArrowRight'||e.key==='d') keys['right']=true;
  if (e.key==='ArrowUp'||e.key==='w') keys['up']=true;
  if (e.key==='ArrowDown'||e.key==='s') keys['down']=true;
  if (e.key===' '||e.key==='z') { keys['fire']=true; e.preventDefault(); }
});
document.addEventListener('keyup', e=>{
  if (e.key==='ArrowLeft'||e.key==='a') keys['left']=false;
  if (e.key==='ArrowRight'||e.key==='d') keys['right']=false;
  if (e.key==='ArrowUp'||e.key==='w') keys['up']=false;
  if (e.key==='ArrowDown'||e.key==='s') keys['down']=false;
  if (e.key===' '||e.key==='z') keys['fire']=false;
});

// Touch controls
function bindTouch(id, keyName) {
  const el=document.getElementById(id);
  if (!el) return;
  const set = (v) => { touchKeys[keyName]=v; el.classList.toggle('pressed',v); };
  el.addEventListener('touchstart',e=>{ e.preventDefault(); set(true); },{passive:false});
  el.addEventListener('touchend',  e=>{ e.preventDefault(); set(false); },{passive:false});
  el.addEventListener('touchcancel',e=>{ e.preventDefault(); set(false); },{passive:false});
}
bindTouch('t-up','up');
bindTouch('t-down','down');
bindTouch('t-left','left');
bindTouch('t-right','right');
bindTouch('t-fire','fire');

// ── Start ─────────────────────────────────────────────────────
startBtn.addEventListener('click', ()=>{
  overlay.style.display='none';
  overlayTitle.innerHTML='VOID<br>HUNTER';
  finalScore.style.display='none';
  startBtn.textContent='LAUNCH';
  state='playing';
  cancelAnimationFrame(animId);
  initStars();
  initGame();
  lastTime=performance.now();
  animId=requestAnimationFrame(gameLoop);
});

initStars();
gameLoop(0);
</script>
